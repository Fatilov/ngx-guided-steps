name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build library
        run: npm run build:lib

      - name: Build demo (production)
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/demo/browser/index.html || (echo "Build output missing!" && exit 1)
          echo "Build output OK"
          ls -la dist/demo/browser/
